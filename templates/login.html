<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>RO Sales Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4f46e5,#9333ea);
}

/* Login Card */

.card{
width:380px;
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 30px 60px rgba(0,0,0,0.25);
text-align:center;
animation:fadeIn .6s ease;
}

/* Logo */

.logo{
width:120px;
margin-bottom:15px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* Title */

h1{
margin:5px 0;
font-size:26px;
font-weight:600;
color:#111827;
}

.tagline{
font-size:13px;
color:#6b7280;
margin-bottom:25px;
}

/* Inputs */

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
transition:.2s;
}

input:focus{
border-color:#6366f1;
outline:none;
}

/* Button */

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
font-size:15px;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#4f46e5;
transform:translateY(-1px);
}

/* Register */

.register{
margin-top:15px;
font-size:14px;
}

.register a{
color:#6366f1;
text-decoration:none;
font-weight:500;
}

/* Error */

.error{
color:red;
margin-bottom:10px;
font-size:14px;
}

/* Animation */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="card">

<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<h1>RO Sales</h1>
<p class="tagline">Sales Management Platform</p>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">

<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="register">
New user? <a href="/register">Register here</a>
</div>

</div>

</body>

</html>
