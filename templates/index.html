<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sales Entry</title>

<style>

body{
font-family:Inter,sans-serif;
margin:0;
background:#f9fafb;
}

.navbar{
background:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.container{
max-width:800px;
margin:40px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

select,input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px;
background:#4f46e5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

.total{
font-size:20px;
margin-top:15px;
color:#10b981;
}

</style>
</head>

<body>

<div class="navbar">
<h3>RO Sales</h3>

<form method="POST" action="/logout">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<button style="background:#ef4444;width:auto;padding:8px 15px">Logout</button>
</form>
</div>

<div class="container">

<h2>Sales Entry</h2>

<select id="product">
<option value="">Select Product</option>
<option value="MacBook|200000">MacBook</option>
<option value="iPhone|150000">iPhone</option>
<option value="iPad|80000">iPad</option>
</select>

<input type="number" id="qty" placeholder="Quantity">

<button id="addBtn">Add Item</button>

<table>
<thead>
<tr>
<th>Product</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>

<tbody id="cart"></tbody>

</table>

<div class="total" id="total">Total ₹0</div>

<form method="POST" action="/purchase">

<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<input type="hidden" name="product" id="hiddenProduct">
<input type="hidden" name="amount" id="hiddenAmount">

<button style="margin-top:15px;background:#10b981">Purchase</button>

</form>

<a href="/dashboard">View Dashboard</a>

</div>

<script>

let total=0;

document.getElementById("addBtn").onclick=function(){

const val=document.getElementById("product").value;
const qty=document.getElementById("qty").value;

if(!val||!qty)return alert("Select product & quantity");

const [name,price]=val.split("|");

const itemTotal=qty*price;

total+=itemTotal;

document.getElementById("cart").innerHTML+=`
<tr>
<td>${name}</td>
<td>${qty}</td>
<td>₹${itemTotal}</td>
</tr>
`;

document.getElementById("total").innerText="Total ₹"+total;

document.getElementById("hiddenProduct").value=name;
document.getElementById("hiddenAmount").value=total;

}

</script>

</body>
</html>
