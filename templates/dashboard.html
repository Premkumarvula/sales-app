<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>

body{
font-family:Inter,sans-serif;
background:#f9fafb;
padding:40px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#4f46e5;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<h2>Sales Dashboard</h2>

<div class="card">

<h3>Total Sales: {{ total_sales }}</h3>
<h3>Total Revenue: ₹{{ total_amount }}</h3>

</div>

<div class="card">

<h3>Sales Details</h3>

<table>

<tr>
<th>User</th>
<th>Product</th>
<th>Amount</th>
</tr>

{% for sale in sales %}

<tr>
<td>{{ sale.username }}</td>
<td>{{ sale.product }}</td>
<td>₹{{ sale.amount }}</td>
</tr>

{% endfor %}

</table>

</div>

<a href="/index">Back to Sales</a>

</body>
</html>
